<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="麻將記分">
<title>麻將記分</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0f0f13;--bg2:#1a1a22;--bg3:#22222e;--card:#1e1e28;--border:#2e2e3e;
  --text:#f0eee8;--text2:#9896a0;--text3:#5a5868;
  --p0:#e8b84b;--p0l:#3a2e0a;
  --p1:#5bbcf5;--p1l:#0a1f30;
  --p2:#7ec87a;--p2l:#0e2410;
  --p3:#e07a9e;--p3l:#2e0e1a;
  --red:#e85c5c;--green:#5cca7a;
  --radius:16px;--font:'Noto Sans TC',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:16px;}
#app{height:100%;display:flex;flex-direction:column;max-width:430px;margin:0 auto;}
.nav{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;order:2;}
.nav-btn{flex:1;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;color:var(--text3);border:none;background:none;cursor:pointer;position:relative;font-family:var(--font);}
.nav-btn.active{color:var(--p0);}
.nav-btn.active::after{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;background:var(--p0);border-radius:0 0 2px 2px;}
.nav-icon{font-size:20px;line-height:1;}
.page{display:none;flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:16px 16px 24px;order:1;}
.page.active{display:block;}
.overlay{display:none;position:fixed;inset:0;background:var(--bg);z-index:50;overflow-y:auto;padding:20px 16px 40px;max-width:430px;margin:0 auto;left:50%;transform:translateX(-50%);}
.overlay.active{display:block;}
#page-select{display:none;}
#page-select.active{display:block;}
.sec-title{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;}
.page-title{font-size:20px;font-weight:700;margin-bottom:4px;}
.page-sub{font-size:13px;color:var(--text2);margin-bottom:20px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
.pc0{color:var(--p0)}.pc1{color:var(--p1)}.pc2{color:var(--p2)}.pc3{color:var(--p3)}
.btn-primary{width:100%;display:block;padding:18px;border-radius:14px;background:var(--p0);color:#0f0f13;font-size:17px;font-weight:700;border:none;cursor:pointer;font-family:var(--font);}
.btn-primary:active{opacity:.85;}
.btn-primary:disabled{background:var(--border);color:var(--text3);cursor:not-allowed;}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--text2);border-radius:10px;padding:10px 16px;font-size:13px;cursor:pointer;font-family:var(--font);}
.btn-danger{background:none;border:1px solid var(--red);color:var(--red);border-radius:10px;padding:12px 20px;font-size:14px;cursor:pointer;font-family:var(--font);}
.inp{background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:16px;padding:10px 14px;width:100%;font-family:var(--font);}
.inp:focus{outline:none;border-color:var(--p0);}

/* SELECT PLAYERS */
.all-players-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.sel-player-btn{padding:14px 10px;border-radius:14px;border:2px solid var(--border);background:var(--bg3);cursor:pointer;text-align:center;position:relative;}
.sel-player-btn.chosen{border-color:var(--p0);background:var(--p0l);}
.sel-player-btn .sp-badge{position:absolute;top:6px;right:6px;width:18px;height:18px;border-radius:50%;background:var(--p0);color:#0f0f13;font-size:10px;font-weight:700;display:none;align-items:center;justify-content:center;}
.sel-player-btn.chosen .sp-badge{display:flex;}
.sel-player-btn .sp-name{font-size:14px;font-weight:600;margin-top:4px;color:var(--text);}
.sel-player-btn.chosen .sp-name{color:var(--p0);}
.chosen-bar{display:flex;gap:8px;margin-bottom:16px;min-height:36px;align-items:center;flex-wrap:wrap;}
.chosen-chip{padding:5px 12px;border-radius:20px;font-size:13px;font-weight:500;}

/* ADD GAME */
.inp-section{margin-bottom:22px;}
.inp-label{font-size:12px;color:var(--text3);margin-bottom:10px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;}
.player-sel-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.winner-btn{padding:14px 10px;border-radius:12px;border:2px solid var(--border);background:var(--bg3);cursor:pointer;text-align:center;font-size:14px;font-weight:600;color:var(--text2);font-family:var(--font);}
.winner-btn.sel{border-color:var(--p0);}
.money-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.m-name{width:52px;font-size:13px;font-weight:500;flex-shrink:0;}
.sign-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sign-btn.pos.active{background:#0e2410;border-color:var(--green);color:var(--green);}
.sign-btn.neg.active{background:#2e0e0e;border-color:var(--red);color:var(--red);}
.money-inp{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:16px;padding:8px 10px;font-family:var(--font);text-align:right;min-width:0;}
.money-inp:focus{outline:none;border-color:var(--p0);}
.stepper{display:flex;align-items:center;gap:8px;}
.step-btn{width:40px;height:40px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--font);flex-shrink:0;}
.step-val{flex:1;text-align:center;font-size:24px;font-weight:700;}
.hh-item{display:flex;gap:6px;align-items:center;margin-bottom:8px;}
.hh-sel{background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:8px 8px;font-family:var(--font);width:80px;flex-shrink:0;}
.hh-inp{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:8px 10px;font-family:var(--font);min-width:0;}
.rm-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--text3);font-size:16px;cursor:pointer;flex-shrink:0;}
.add-link{font-size:13px;color:var(--p0);cursor:pointer;padding:4px 0;display:inline-block;}
.streak-row{display:flex;gap:8px;align-items:center;}
.streak-sel{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;padding:10px 10px;font-family:var(--font);}

/* STATS */
.hall-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.hall-card{background:var(--bg3);border-radius:14px;padding:14px;text-align:center;}
.hall-icon{font-size:24px;margin-bottom:6px;}
.hall-label{font-size:11px;color:var(--text3);margin-bottom:4px;}
.hall-name{font-size:15px;font-weight:700;}
.hall-val{font-size:12px;color:var(--text2);margin-top:2px;}
.sum-table{width:100%;border-collapse:collapse;}
.sum-table th{font-size:11px;color:var(--text3);padding:6px 6px;text-align:left;border-bottom:1px solid var(--border);}
.sum-table td{font-size:13px;padding:10px 6px;border-bottom:1px solid var(--border);vertical-align:middle;}
.sum-table tr:last-child td{border-bottom:none;}
.pos{color:var(--green);font-weight:500;}
.neg{color:var(--red);font-weight:500;}

/* HISTORY */
.hist-item{padding:12px 0;border-bottom:1px solid var(--border);}
.hist-item:last-child{border-bottom:none;}
.hist-header{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;}
.hist-num{font-size:11px;color:var(--text3);width:18px;flex-shrink:0;padding-top:2px;}
.hist-winner{font-size:14px;font-weight:600;}
.badge{display:inline-block;font-size:11px;padding:2px 7px;border-radius:20px;font-weight:500;margin-right:3px;margin-top:3px;}
.badge-zimo{background:#1a2e1a;color:var(--green);}
.badge-high{background:#2e1a0a;color:var(--p0);}
.badge-streak{background:#1a1a2e;color:var(--p1);}
.hist-money{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
.money-chip{font-size:12px;padding:3px 8px;border-radius:20px;}

/* SETTINGS */
.player-manage{display:flex;flex-direction:column;gap:8px;}
.pm-item{display:flex;gap:8px;align-items:center;}
.pm-item input{flex:1;}
.pm-rm{background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;width:32px;line-height:1;}

.toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:10px 20px;font-size:14px;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;z-index:999;max-width:90vw;}
.toast.show{opacity:1;}
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:14px;line-height:2;}
</style>
</head>
<body>
<div id="app">
  <!-- SELECT PLAYERS PAGE (normal page inside nav framework) -->
  <div class="page" id="page-select">
    <div class="page-title">選擇玩家</div>
    <div class="page-sub">選擇本次參與的 4 位玩家</div>
    <div class="chosen-bar" id="chosen-bar"></div>
    <div class="all-players-grid" id="all-players-grid"></div>
    <button class="btn-primary" id="confirm-players-btn" onclick="confirmPlayers()" disabled>開始記分</button>
  </div>

  <div class="page" id="page-input">
    <div class="sec-title">本局玩家</div>
    <div id="active-players-display" style="display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;"></div>
    <button class="btn-primary" id="add-game-btn" onclick="openAddGame()">＋ 新增這將</button>
    <div style="margin-top:20px;">
      <div class="sec-title">本局快覽</div>
      <div id="quick-stats"></div>
    </div>
  </div>

  <div class="page" id="page-stats"><div id="stats-content"></div></div>
  <div class="page" id="page-history"><div id="history-content"></div></div>
  <div class="page" id="page-settings">
    <div class="card">
      <div class="sec-title">玩家名單（最多10位）</div>
      <div class="player-manage" id="player-manage"></div>
      <button class="btn-ghost" style="margin-top:12px;width:100%" onclick="addPlayerSlot()">＋ 新增玩家</button>
    </div>
    <div class="card">
      <div class="sec-title">資料管理</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;padding-top:4px;">
        <button class="btn-danger" onclick="resetSession()">結束本局</button>
        <button class="btn-danger" onclick="resetAll()">清除所有記錄</button>
      </div>
    </div>
    <button class="btn-primary" style="margin-top:4px" onclick="saveSettings()">儲存設定</button>
  </div>

  <!-- ADD GAME PAGE -->
  <div class="page" id="page-addgame">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
      <button class="btn-ghost" onclick="goPage('input',document.getElementById('nav-input'))">← 返回</button>
      <div style="font-size:18px;font-weight:700;">第 <span id="game-num">1</span> 將</div>
    </div>

    <div class="inp-section">
      <div class="inp-label">🏆 勝者</div>
      <div class="player-sel-row" id="winner-grid"></div>
    </div>

    <div class="inp-section">
      <div class="inp-label">💰 各人金額（正數=贏 負數=輸）</div>
      <div id="money-inputs"></div>
    </div>

    <div class="inp-section">
      <div class="inp-label">🤲 各人自摸次數</div>
      <div id="zimo-inputs"></div>
    </div>

    <div class="inp-section">
      <div class="inp-label">🎯 台數（本將最高）</div>
      <div class="stepper">
        <button class="step-btn" onclick="changeTai(-1)">−</button>
        <div class="step-val" id="tai-val">0</div>
        <button class="step-btn" onclick="changeTai(1)">+</button>
      </div>
    </div>

    <div class="inp-section" id="hh-section" style="display:none">
      <div class="inp-label">🔥 高台牌型（≥4台）</div>
      <div id="hh-list"></div>
      <span class="add-link" onclick="addHH()">＋ 新增牌型記錄</span>
    </div>

    <div class="inp-section">
      <div class="inp-label">🔁 連莊</div>
      <div class="streak-row">
        <select class="streak-sel" id="streak-who"><option value="">無連莊</option></select>
        <div class="stepper" style="flex:1">
          <button class="step-btn" onclick="changeStreak(-1)">−</button>
          <div class="step-val" id="streak-val">0</div>
          <button class="step-btn" onclick="changeStreak(1)">+</button>
        </div>
      </div>
    </div>

    <button class="btn-primary" id="save-game-btn" onclick="saveGame()" disabled>記錄這將</button>
    <div style="height:30px"></div>
  </div>

  <div class="nav">
    <button class="nav-btn" id="nav-select" onclick="goPage('select',this)"><span class="nav-icon">👥</span>選人</button>
    <button class="nav-btn" id="nav-input" onclick="goPage('input',this)"><span class="nav-icon">✏️</span>記分</button>
    <button class="nav-btn" id="nav-stats" onclick="goPage('stats',this)"><span class="nav-icon">📊</span>統計</button>
    <button class="nav-btn" id="nav-history" onclick="goPage('history',this)"><span class="nav-icon">📋</span>歷史</button>
    <button class="nav-btn" id="nav-settings" onclick="goPage('settings',this)"><span class="nav-icon">⚙️</span>設定</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const PCOLOR=['var(--p0)','var(--p1)','var(--p2)','var(--p3)'];
const PCLIGHT=['var(--p0l)','var(--p1l)','var(--p2l)','var(--p3l)'];
const ICONS=['🀇','🀙','🀀','🎴','🃏','🀄','♟️','🎲','🎯','⭐'];

// --- 雲端設定開始 ---
const CLOUD_URL = "https://script.google.com/macros/s/AKfycbyflEO2bLBaSJ7TTTtLnVQWT7FHU7csReb47uk9lAlJ367Svaqws5krRVcOXk2iFVAY2A/exec";

// 舊的 load 改名為本地讀取，並作為預備
function loadLocal(){try{return JSON.parse(localStorage.getItem('mj3'))||def();}catch(e){return def();}}
function def(){return{allPlayers:['玩家1','玩家2','玩家3','玩家4'],session:null,history:[]};}

// 升級版的 save：存本地的同時也發送到 Google Sheets
async function save(){
  localStorage.setItem('mj3',JSON.stringify(data));
  try {
    fetch(CLOUD_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
  } catch (e) { console.error("同步失敗", e); }
}

// 新增的雲端同步函數
async function syncFromCloud() {
  try {
    const res = await fetch(CLOUD_URL);
    const text = await res.text();
    if (text && text.trim() !== "") {
      const cloudData = JSON.parse(text);
      if (JSON.stringify(cloudData) !== JSON.stringify(data)) {
        data = cloudData;
        localStorage.setItem('mj3', JSON.stringify(data));
        // 強制重新渲染所有頁面內容
        renderInputPage();
        renderQuickStats();
        if(typeof renderHistory === 'function') renderHistory();
      }
    }
  } catch (e) { console.warn("同步失敗，使用本地資料"); }
}

// 每 15 秒檢查一次雲端是否有更新
setInterval(syncFromCloud, 15000);
// --- 雲端設定結束 ---

let data=loadLocal(); // 初始先讀取本地
syncFromCloud();      // 接著立刻嘗試同步雲端最新資料

let data=load();
let selPlayers=[];
let gs={winner:-1,money:[0,0,0,0],signs:[1,1,1,1],zimo:[0,0,0,0],tai:0,hh:[],streakN:0};

function init(){
  goPage('select', document.getElementById('nav-select'));
  selPlayers=[];
  renderSelGrid();
}

// --- SELECT PLAYERS ---
function openSelectPlayers(){
  selPlayers=[];
  renderSelGrid();
  goPage('select', document.getElementById('nav-select'));
}
function renderSelGrid(){
  document.getElementById('all-players-grid').innerHTML=data.allPlayers.map((p,i)=>`
    <button class="sel-player-btn ${selPlayers.includes(i)?'chosen':''}" onclick="toggleSel(${i})">
      <div class="sp-badge">${selPlayers.indexOf(i)+1||''}</div>
      <div style="font-size:20px">${ICONS[i]||'👤'}</div>
      <div class="sp-name">${p}</div>
    </button>`).join('');
  const bar=document.getElementById('chosen-bar');
  bar.innerHTML=selPlayers.length===0
    ?'<span style="font-size:13px;color:var(--text3)">需選4位</span>'
    :selPlayers.map(i=>`<span class="chosen-chip" style="background:${PCLIGHT[selPlayers.indexOf(i)]};color:${PCOLOR[selPlayers.indexOf(i)]}">${data.allPlayers[i]}</span>`).join('');
  document.getElementById('confirm-players-btn').disabled=selPlayers.length!==4;
}
function toggleSel(i){
  const idx=selPlayers.indexOf(i);
  if(idx>=0)selPlayers.splice(idx,1);
  else if(selPlayers.length<4)selPlayers.push(i);
  renderSelGrid();
}
function confirmPlayers(){
  data.session={playerIndices:[...selPlayers],games:[]};
  save();
  goPage('input', document.getElementById('nav-input'));
  renderInputPage();
  renderQuickStats();
}

// --- INPUT PAGE ---
function renderInputPage(){
  if(!data.session)return;
  document.getElementById('active-players-display').innerHTML=
    data.session.playerIndices.map((pi,ci)=>`
      <div style="padding:6px 12px;border-radius:20px;background:${PCLIGHT[ci]};color:${PCOLOR[ci]};font-size:13px;font-weight:600">${data.allPlayers[pi]}</div>
    `).join('');
}
function renderQuickStats(){
  const qs=document.getElementById('quick-stats');
  if(!data.session||data.session.games.length===0){qs.innerHTML='<div class="empty">尚無記錄<br>點「新增這將」開始！</div>';return;}
  const s=sessionStats();
  const pis=data.session.playerIndices;
  qs.innerHTML=`<div class="card"><table class="sum-table">
    <thead><tr><th>玩家</th><th>勝</th><th>自摸</th><th>收支</th></tr></thead>
    <tbody>${pis.map((pi,ci)=>`<tr>
      <td style="color:${PCOLOR[ci]};font-weight:600">${data.allPlayers[pi]}</td>
      <td>${s[ci].wins}</td><td>${s[ci].zimo}</td>
      <td class="${s[ci].money>=0?'pos':'neg'}">${s[ci].money>=0?'+':''}$${s[ci].money}</td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

// --- ADD GAME ---
function openAddGame(){
  if(!data.session)return;
  gs={winner:-1,money:[0,0,0,0],signs:[1,1,1,1],zimo:[0,0,0,0],tai:0,hh:[],streakN:0};
  document.getElementById('game-num').textContent=data.session.games.length+1;
  renderWinnerGrid();renderMoneyInputs();renderZimoInputs();
  document.getElementById('tai-val').textContent='0';
  document.getElementById('hh-section').style.display='none';
  document.getElementById('hh-list').innerHTML='';
  renderStreakSel();
  document.getElementById('streak-val').textContent='0';
  document.getElementById('save-game-btn').disabled=true;
  goPage('addgame', document.getElementById('nav-input'));
  document.getElementById('page-addgame').scrollTop=0;
}

function renderWinnerGrid(){
  const pis=data.session.playerIndices;
  document.getElementById('winner-grid').innerHTML=pis.map((pi,ci)=>`
    <button class="winner-btn ${gs.winner===ci?'sel':''}"
      style="${gs.winner===ci?`border-color:${PCOLOR[ci]};color:${PCOLOR[ci]};background:${PCLIGHT[ci]}`:''}"
      onclick="selWinner(${ci})">${data.allPlayers[pi]}</button>`).join('');
}
function selWinner(ci){gs.winner=ci;renderWinnerGrid();document.getElementById('save-game-btn').disabled=false;}

function renderMoneyInputs(){
  const pis=data.session.playerIndices;
  document.getElementById('money-inputs').innerHTML=pis.map((pi,ci)=>`
    <div class="money-row">
      <div class="m-name" style="color:${PCOLOR[ci]}">${data.allPlayers[pi]}</div>
      <button class="sign-btn pos ${gs.signs[ci]>0?'active':''}" onclick="setSign(${ci},1)">+</button>
      <button class="sign-btn neg ${gs.signs[ci]<0?'active':''}" onclick="setSign(${ci},-1)">−</button>
      <input class="money-inp" type="number" inputmode="numeric" placeholder="0" id="m${ci}" value="${gs.money[ci]?Math.abs(gs.money[ci]):''}">
    </div>`).join('');
}
function setSign(ci,s){gs.signs[ci]=s;renderMoneyInputs();}

function renderZimoInputs(){
  const pis=data.session.playerIndices;
  document.getElementById('zimo-inputs').innerHTML=pis.map((pi,ci)=>`
    <div class="money-row">
      <div class="m-name" style="color:${PCOLOR[ci]}">${data.allPlayers[pi]}</div>
      <div class="stepper" style="flex:1">
        <button class="step-btn" onclick="chgZimo(${ci},-1)">−</button>
        <div class="step-val" style="font-size:20px" id="z${ci}">${gs.zimo[ci]}</div>
        <button class="step-btn" onclick="chgZimo(${ci},1)">+</button>
      </div>
    </div>`).join('');
}
function chgZimo(ci,d){gs.zimo[ci]=Math.max(0,gs.zimo[ci]+d);document.getElementById('z'+ci).textContent=gs.zimo[ci];}

function changeTai(d){
  gs.tai=Math.max(0,gs.tai+d);
  document.getElementById('tai-val').textContent=gs.tai;
  document.getElementById('hh-section').style.display=gs.tai>=4?'block':'none';
}

function renderStreakSel(){
  const pis=data.session.playerIndices;
  document.getElementById('streak-who').innerHTML=`<option value="">無連莊</option>`
    +pis.map((pi,ci)=>`<option value="${ci}">${data.allPlayers[pi]}</option>`).join('');
}
function changeStreak(d){gs.streakN=Math.max(0,gs.streakN+d);document.getElementById('streak-val').textContent=gs.streakN;}

function addHH(){
  const pis=data.session.playerIndices;
  const opts=pis.map((pi,ci)=>`<option value="${ci}">${data.allPlayers[pi]}</option>`).join('');
  const id=Date.now();
  gs.hh.push({id,who:0,name:''});
  const div=document.createElement('div');
  div.className='hh-item';div.id='hh'+id;
  div.innerHTML=`<select class="hh-sel" onchange="updHH(${id},'who',this.value)">${opts}</select>
    <input class="hh-inp" placeholder="牌型名稱" oninput="updHH(${id},'name',this.value)">
    <button class="rm-btn" onclick="rmHH(${id})">×</button>`;
  document.getElementById('hh-list').appendChild(div);
}
function updHH(id,k,v){const h=gs.hh.find(x=>x.id===id);if(h)h[k]=k==='who'?parseInt(v):v;}
function rmHH(id){gs.hh=gs.hh.filter(x=>x.id!==id);const el=document.getElementById('hh'+id);if(el)el.remove();}

function saveGame(){
  const pis=data.session.playerIndices;
  const money=pis.map((_,ci)=>gs.signs[ci]*(parseInt(document.getElementById('m'+ci).value)||0));
  const streakWho=document.getElementById('streak-who').value;
  data.session.games.push({
    winner:gs.winner,
    money,
    zimo:[...gs.zimo],
    tai:gs.tai,
    hh:gs.hh.filter(h=>h.name).map(h=>({who:h.who,name:h.name})),
    streakWho:streakWho!==''?parseInt(streakWho):-1,
    streakN:gs.streakN
  });
  save();
  goPage('input', document.getElementById('nav-input'));
  renderInputPage();renderQuickStats();
  toast(`✅ 第${data.session.games.length}將已記錄`);
}

// --- STATS ---
function sessionStats(){
  if(!data.session)return[];
  const s=Array.from({length:4},()=>({wins:0,zimo:0,high:0,money:0,maxStreak:0}));
  data.session.games.forEach(g=>{
    if(g.winner>=0)s[g.winner].wins++;
    g.zimo.forEach((z,i)=>s[i].zimo+=z);
    g.money.forEach((m,i)=>s[i].money+=m);
    if(g.tai>=4)s[g.winner>=0?g.winner:0].high++;
    if(g.streakWho>=0&&g.streakN>s[g.streakWho].maxStreak)s[g.streakWho].maxStreak=g.streakN;
  });
  return s;
}

function allTimeStats(){
  const all=[...data.history];
  if(data.session)all.push(data.session);
  const map={};
  function ens(n){if(!map[n])map[n]={name:n,wins:0,zimo:0,high:0,money:0,maxStreak:0};}
  all.forEach(sess=>{
    sess.games.forEach(g=>{
      const pis=sess.playerIndices;
      pis.forEach((pi,ci)=>{
        const n=data.allPlayers[pi]||`P${pi}`;ens(n);
        map[n].money+=g.money[ci]||0;
        map[n].zimo+=g.zimo[ci]||0;
      });
      if(g.winner>=0){const n=data.allPlayers[pis[g.winner]]||`P${pis[g.winner]}`;ens(n);map[n].wins++;}
      if(g.tai>=4&&g.hh){g.hh.forEach(h=>{if(h.who>=0&&h.who<pis.length){const n=data.allPlayers[pis[h.who]]||`P${pis[h.who]}`;ens(n);map[n].high++;}});}
      if(g.streakWho>=0&&g.streakWho<pis.length){const n=data.allPlayers[pis[g.streakWho]]||`P${pis[g.streakWho]}`;ens(n);if(g.streakN>map[n].maxStreak)map[n].maxStreak=g.streakN;}
    });
  });
  return Object.values(map);
}

function renderStats(){
  const at=allTimeStats();
  if(at.length===0){document.getElementById('stats-content').innerHTML='<div class="empty">尚無任何記錄</div>';return;}
  const byMoney=at.slice().sort((a,b)=>b.money-a.money);
  const top=byMoney[0],bot=byMoney[byMoney.length-1];
  const topStreak=at.reduce((a,b)=>a.maxStreak>b.maxStreak?a:b);
  const topZimo=at.reduce((a,b)=>a.zimo>b.zimo?a:b);
  const totalG=(data.history.reduce((a,s)=>a+s.games.length,0))+(data.session?data.session.games.length:0);
  document.getElementById('stats-content').innerHTML=`
  <div class="sec-title" style="margin-bottom:12px">名人堂</div>
  <div class="hall-grid">
    <div class="hall-card"><div class="hall-icon">💰</div><div class="hall-label">贏最多</div><div class="hall-name">${top.name}</div><div class="hall-val">${top.money>=0?'+':''}$${top.money}</div></div>
    <div class="hall-card"><div class="hall-icon">😢</div><div class="hall-label">輸最多</div><div class="hall-name">${bot.name}</div><div class="hall-val">$${bot.money}</div></div>
    <div class="hall-card"><div class="hall-icon">🔁</div><div class="hall-label">連莊王</div><div class="hall-name">${topStreak.name}</div><div class="hall-val">最高${topStreak.maxStreak}把</div></div>
    <div class="hall-card"><div class="hall-icon">🤲</div><div class="hall-label">自摸王</div><div class="hall-name">${topZimo.name}</div><div class="hall-val">${topZimo.zimo}次</div></div>
  </div>
  <div class="sec-title" style="margin-bottom:12px">累積總表（${totalG}將）</div>
  <div class="card"><table class="sum-table">
    <thead><tr><th>玩家</th><th>勝</th><th>自摸</th><th>高台</th><th>累積收支</th></tr></thead>
    <tbody>${byMoney.map(s=>`<tr>
      <td style="font-weight:600">${s.name}</td><td>${s.wins}</td><td>${s.zimo}</td><td>${s.high}</td>
      <td class="${s.money>=0?'pos':'neg'}">${s.money>=0?'+':''}$${s.money}</td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

function renderHistory(){
  const sess=data.session;
  if(!sess||sess.games.length===0){document.getElementById('history-content').innerHTML='<div class="empty">本局尚無記錄</div>';return;}
  const pis=sess.playerIndices;
  const rows=sess.games.map((g,idx)=>{
    const wci=g.winner;
    const wname=wci>=0?data.allPlayers[pis[wci]]:'—';
    const badges=[
      g.zimo.some(z=>z>0)?`<span class="badge badge-zimo">自摸</span>`:'',
      g.tai>=4?`<span class="badge badge-high">${g.tai}台</span>`:'',
      g.streakWho>=0&&g.streakN>0?`<span class="badge badge-streak">連莊${g.streakN}</span>`:''
    ].join('');
    const hhtext=g.hh&&g.hh.length?g.hh.map(h=>`${data.allPlayers[pis[h.who]]||''}·${h.name}`).join('、'):'';
    return `<div class="hist-item">
      <div class="hist-header">
        <div class="hist-num">${idx+1}</div>
        <div style="width:30px;height:30px;border-radius:50%;background:${wci>=0?PCLIGHT[wci]:'var(--bg3)'};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:${wci>=0?PCOLOR[wci]:'var(--text3)'};flex-shrink:0">${wname[0]||'?'}</div>
        <div style="flex:1;min-width:0">
          <div class="hist-winner" style="color:${wci>=0?PCOLOR[wci]:'var(--text)'}">${wname} 勝</div>
          <div>${badges}</div>
          ${hhtext?`<div style="font-size:11px;color:var(--text3);margin-top:2px">${hhtext}</div>`:''}
        </div>
      </div>
      <div class="hist-money">${pis.map((pi,ci)=>`<span class="money-chip" style="background:${PCLIGHT[ci]};color:${PCOLOR[ci]}">${data.allPlayers[pi]} ${g.money[ci]>=0?'+':''}$${g.money[ci]}</span>`).join('')}</div>
    </div>`;
  }).reverse().join('');
  document.getElementById('history-content').innerHTML=`<div class="card">${rows}</div>`;
}

// --- SETTINGS ---
function renderSettings(){
  document.getElementById('player-manage').innerHTML=data.allPlayers.map((p,i)=>`
    <div class="pm-item">
      <input class="inp" id="pm${i}" value="${p}" maxlength="8">
      ${data.allPlayers.length>4?`<button class="pm-rm" onclick="rmPlayer(${i})">×</button>`:''}
    </div>`).join('');
}
function addPlayerSlot(){if(data.allPlayers.length>=10){toast('最多10位');return;}data.allPlayers.push(`玩家${data.allPlayers.length+1}`);renderSettings();}
function rmPlayer(i){if(data.allPlayers.length<=4){toast('至少需4位');return;}data.allPlayers.splice(i,1);renderSettings();}
function saveSettings(){
  data.allPlayers=data.allPlayers.map((_,i)=>document.getElementById('pm'+i).value.trim()||`玩家${i+1}`);
  save();toast('✅ 已儲存');
}
function resetSession(){
  if(!confirm('結束本局並存入歷史？'))return;
  if(data.session)data.history.push(data.session);
  data.session=null;save();openSelectPlayers();
}
function resetAll(){
  if(!confirm('清除所有記錄？無法復原。'))return;
  data.session=null;data.history=[];save();openSelectPlayers();toast('已清除');
}

function goPage(name,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  if(el) el.classList.add('active');
  if(name==='select'){selPlayers=[];renderSelGrid();}
  if(name==='stats')renderStats();
  if(name==='history')renderHistory();
  if(name==='settings')renderSettings();
}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}

init();
</script>
</body>
</html>
